name: Build RadioKlic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────
  # Windows EXE
  # ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow requests

      - name: Build EXE
        run: pyinstaller radioklic.spec --clean --noconfirm

      - name: Bundle mpv player
        shell: pwsh
        run: |
          Write-Host "Prenašam mpv za Windows..."
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20240901/mpv-x86_64-20240901-git-a39c369.zip"
          try {
            Invoke-WebRequest -Uri $url -OutFile mpv.zip -TimeoutSec 60 -UseBasicParsing
            Expand-Archive -Path mpv.zip -DestinationPath mpv_tmp -Force
            $exe = Get-ChildItem -Path mpv_tmp -Filter "mpv.exe" -Recurse | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName "dist\RadioKlic\mpv.exe"
              Write-Host "OK: mpv.exe dodan ($([math]::Round((Get-Item 'dist\RadioKlic\mpv.exe').Length/1MB,1)) MB)"
            } else {
              Write-Host "OPOZORILO: mpv.exe ni bil najden — preskočim"
            }
          } catch {
            Write-Host "OPOZORILO: mpv prenos ni uspel — $_"
            Write-Host "Uporabnik bo moral sam namestiti mpv."
          }

      - name: Prepare dist
        shell: cmd
        run: |
          mkdir dist\RadioKlic\ICONS
          echo Station icons folder > dist\RadioKlic\ICONS\readme.txt
          echo mpv player included > dist\RadioKlic\player_bundled.txt

      - name: Package ZIP
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace "^v", ""
          if (-not $ver) { $ver = "dev" }
          Compress-Archive -Path dist\RadioKlic\* -DestinationPath "RadioKlic-$ver-Windows.zip"
          $size = [math]::Round((Get-Item "RadioKlic-$ver-Windows.zip").Length/1MB,1)
          Write-Host "ZIP ustvarjen: RadioKlic-$ver-Windows.zip ($size MB)"

      - uses: actions/upload-artifact@v4
        with:
          name: RadioKlic-Windows
          path: RadioKlic-*-Windows.zip
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Linux — brez grafičnega zaslona, samo paket
  # ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    continue-on-error: true   # ← ne blokira Release če pade
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk python3-dev \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxtst6 libxi6 libxcursor1 libxdamage1 \
            libxcomposite1 libxfixes3 libatk1.0-0 \
            libgtk-3-0 libgdk-pixbuf2.0-0 \
            xvfb

      - name: Install Python dependencies
        run: pip install pyinstaller pillow requests

      - name: Build Linux binary (virtual display)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          pyinstaller radioklic.spec --clean --noconfirm

      - name: Prepare dist
        run: |
          mkdir -p dist/RadioKlic/ICONS
          echo "Place station icons here" > dist/RadioKlic/ICONS/readme.txt

      - name: Package tar.gz
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ -z "$VER" ]; then VER="dev"; fi
          tar -czf "RadioKlic-${VER}-Linux.tar.gz" -C dist RadioKlic

      - uses: actions/upload-artifact@v4
        with:
          name: RadioKlic-Linux
          path: RadioKlic-*-Linux.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────────
  # macOS
  # ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow requests

      - name: Build macOS app
        run: pyinstaller radioklic.spec --clean --noconfirm

      - name: Prepare dist
        run: |
          mkdir -p dist/RadioKlic/ICONS
          echo "Place station icons here" > dist/RadioKlic/ICONS/readme.txt

      - name: Package tar.gz
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ -z "$VER" ]; then VER="dev"; fi
          tar -czf "RadioKlic-${VER}-macOS.tar.gz" -C dist RadioKlic

      - uses: actions/upload-artifact@v4
        with:
          name: RadioKlic-macOS
          path: RadioKlic-*-macOS.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Release — ustvari Release tudi če Linux pade
  # ─────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/ || echo "No files"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RadioKlic ${{ github.ref_name }}"
          body: |
            ## RadioKlic ${{ github.ref_name }}

            ### 📦 Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🪟 Windows | `RadioKlic-*-Windows.zip` | Extract and run RadioKlic.exe |
            | 🐧 Linux | `RadioKlic-*-Linux.tar.gz` | `tar -xzf` then `./RadioKlic` |
            | 🍎 macOS | `RadioKlic-*-macOS.tar.gz` | Extract and run |

            ### ⚠️ Media player required
            RadioKlic needs **mpv** for audio playback:
            - **Linux:** `sudo apt install mpv`
            - **Windows:** Place [mpv.exe](https://mpv.io/installation/) next to RadioKlic.exe
            - **macOS:** `brew install mpv`

            ### 🆓 Radio Browser
            Built-in station search — no registration, ~35,000 stations.
          files: release-files/**
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
