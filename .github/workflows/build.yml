name: Build Radiola

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────
  # Windows EXE
  # ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow requests

      - name: Build EXE
        run: pyinstaller radiola.spec --clean --noconfirm

      - name: Prepare dist
        shell: cmd
        run: |
          mkdir dist\Radiola\ICONS
          echo Place station icons here > dist\Radiola\ICONS\readme.txt

      - name: Package ZIP
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace "^v", ""
          if (-not $ver) { $ver = "dev" }
          Compress-Archive -Path dist\Radiola\* -DestinationPath "Radiola-$ver-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Radiola-Windows
          path: Radiola-*-Windows.zip
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Linux — brez grafičnega zaslona, samo paket
  # ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    continue-on-error: true   # ← ne blokira Release če pade
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk python3-dev \
            libx11-6 libxext6 libxrender1 libxrandr2 \
            libxtst6 libxi6 libxcursor1 libxdamage1 \
            libxcomposite1 libxfixes3 libatk1.0-0 \
            libgtk-3-0 libgdk-pixbuf2.0-0 \
            xvfb

      - name: Install Python dependencies
        run: pip install pyinstaller pillow requests

      - name: Build Linux binary (virtual display)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          pyinstaller radiola.spec --clean --noconfirm

      - name: Prepare dist
        run: |
          mkdir -p dist/Radiola/ICONS
          echo "Place station icons here" > dist/Radiola/ICONS/readme.txt

      - name: Package tar.gz
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ -z "$VER" ]; then VER="dev"; fi
          tar -czf "Radiola-${VER}-Linux.tar.gz" -C dist Radiola

      - uses: actions/upload-artifact@v4
        with:
          name: Radiola-Linux
          path: Radiola-*-Linux.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────────
  # macOS
  # ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow requests

      - name: Build macOS app
        run: pyinstaller radiola.spec --clean --noconfirm

      - name: Prepare dist
        run: |
          mkdir -p dist/Radiola/ICONS
          echo "Place station icons here" > dist/Radiola/ICONS/readme.txt

      - name: Package tar.gz
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          if [ -z "$VER" ]; then VER="dev"; fi
          tar -czf "Radiola-${VER}-macOS.tar.gz" -C dist Radiola

      - uses: actions/upload-artifact@v4
        with:
          name: Radiola-macOS
          path: Radiola-*-macOS.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Release — ustvari Release tudi če Linux pade
  # ─────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/ || echo "No files"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Radiola ${{ github.ref_name }}"
          body: |
            ## Radiola ${{ github.ref_name }}

            ### 📦 Downloads

            | Platform | File | Notes |
            |---|---|---|
            | 🪟 Windows | `Radiola-*-Windows.zip` | Extract and run Radiola.exe |
            | 🐧 Linux | `Radiola-*-Linux.tar.gz` | `tar -xzf` then `./Radiola` |
            | 🍎 macOS | `Radiola-*-macOS.tar.gz` | Extract and run |

            ### ⚠️ Media player required
            Radiola needs **mpv** for audio playback:
            - **Linux:** `sudo apt install mpv`
            - **Windows:** Place [mpv.exe](https://mpv.io/installation/) next to Radiola.exe
            - **macOS:** `brew install mpv`

            ### 🆓 Radio Browser
            Built-in station search — no registration, ~35,000 stations.
          files: release-files/**
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
