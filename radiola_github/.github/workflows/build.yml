name: Build Radiola

on:
  push:
    tags:
      - 'v*'          # Zažene se pri tagu npr. v1.4.0
  workflow_dispatch:  # Ročni zagon

permissions:
  contents: write     # Za ustvarjanje Release

jobs:

  # ─────────────────────────────────────────────────
  # Windows EXE
  # ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow requests

      - name: Build EXE
        run: |
          pyinstaller radiola.spec --clean --noconfirm

      - name: Create ICONS folder
        run: |
          mkdir -p dist\Radiola\ICONS
          echo "# Sem daj ikone postaj" > dist\Radiola\ICONS\readme.txt

      - name: Package ZIP
        run: |
          $ver = "${{ github.ref_name }}" -replace "^v", ""
          Compress-Archive -Path dist\Radiola\* -DestinationPath "Radiola-$ver-Windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Radiola-Windows
          path: Radiola-*-Windows.zip
          retention-days: 30

  # ─────────────────────────────────────────────────
  # Linux Binary + AppImage
  # ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libpython3-dev

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pillow requests

      - name: Build Linux binary
        run: |
          pyinstaller radiola.spec --clean --noconfirm

      - name: Create ICONS folder
        run: |
          mkdir -p dist/Radiola/ICONS
          echo "# Sem daj ikone postaj" > dist/Radiola/ICONS/readme.txt

      - name: Package tar.gz
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          tar -czf "Radiola-${VER}-Linux.tar.gz" -C dist Radiola

      - name: Build AppImage
        run: |
          # Prenesi appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          VER="${{ github.ref_name }}"
          VER="${VER#v}"

          # Ustvari AppDir
          mkdir -p Radiola.AppDir/usr/bin
          mkdir -p Radiola.AppDir/usr/share/applications
          cp -r dist/Radiola Radiola.AppDir/usr/bin/Radiola_data

          # AppRun
          cat > Radiola.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          "$APPDIR/usr/bin/Radiola_data/Radiola" "$@"
          APPRUN
          chmod +x Radiola.AppDir/AppRun

          # .desktop
          cat > Radiola.AppDir/radiola.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Radiola
          Type=Application
          Exec=Radiola
          Icon=radiola
          Categories=Audio;Music;
          Comment=Internet Radio Player
          DESKTOP

          cp Radiola.AppDir/radiola.desktop Radiola.AppDir/usr/share/applications/

          # Zgradi AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage Radiola.AppDir "Radiola-${VER}-x86_64.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Radiola-Linux
          path: |
            Radiola-*-Linux.tar.gz
            Radiola-*-x86_64.AppImage
          retention-days: 30

  # ─────────────────────────────────────────────────
  # macOS .app
  # ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow requests

      - name: Build macOS app
        run: |
          pyinstaller radiola.spec --clean --noconfirm

      - name: Package DMG
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          # Preprosta tar.gz (za DMG bi potreboval create-dmg orodje)
          tar -czf "Radiola-${VER}-macOS.tar.gz" -C dist Radiola

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Radiola-macOS
          path: Radiola-*-macOS.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────────
  # GitHub Release (samo pri tagu)
  # ─────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Radiola ${{ github.ref_name }}"
          body: |
            ## Radiola ${{ github.ref_name }}

            ### 📦 Prenosi

            | Platform | Datoteka | Opomba |
            |---|---|---|
            | 🪟 Windows | `Radiola-*-Windows.zip` | Razpakira in zaženi Radiola.exe |
            | 🐧 Linux | `Radiola-*-Linux.tar.gz` | `tar -xzf` + `./Radiola` |
            | 🐧 Linux | `Radiola-*-x86_64.AppImage` | Chmod +x in zaženi direktno |
            | 🍎 macOS | `Radiola-*-macOS.tar.gz` | Razpakira in zaženi |

            ### ⚠️ Predvajalnik (obvezno)
            Radiola potrebuje **mpv** za predvajanje avdia:
            - **Linux:** `sudo apt install mpv`
            - **Windows:** [mpv.io](https://mpv.io/installation/) — daj mpv.exe v isto mapo
            - **macOS:** `brew install mpv`

            ---
            Celoten changelog: [CHANGELOG.md](CHANGELOG.md)
          files: release-files/**
          draft: false
          prerelease: false
